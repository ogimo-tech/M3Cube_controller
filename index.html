<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3Cube BLE Controller</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f0f0; padding: 12px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.2rem; margin-bottom: 12px; text-align: center; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 0; }
.tab-btn {
  padding: 8px 24px; border: none; border-radius: 6px 6px 0 0;
  background: #ccc; cursor: pointer; font-size: 1rem;
}
.tab-btn.active { background: #fff; font-weight: bold; }
.tab-content {
  display: none; background: #fff;
  border-radius: 0 8px 8px 8px; padding: 16px;
  border: 1px solid #ddd;
}
.tab-content.active { display: block; }

/* Connection row */
.conn-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.btn-connect {
  padding: 8px 20px; border: none; border-radius: 6px;
  background: #4caf50; color: #fff; cursor: pointer; font-size: 0.95rem;
}
.btn-connect.connected { background: #f44336; }
.conn-status { font-size: 0.9rem; color: #888; }
.conn-status.connected { color: #4caf50; font-weight: bold; }

/* Command log */
.log-section { margin-top: 16px; }
.log-label { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
.log-list {
  list-style: none; font-size: 0.8rem; font-family: monospace;
  color: #333; min-height: 80px; background: #f9f9f9;
  border: 1px solid #e0e0e0; border-radius: 4px; padding: 6px 10px;
}
.log-list li { padding: 2px 0; }

/* Compatibility warning */
.compat-warning {
  background: #fff3cd; border: 1px solid #ffc107;
  border-radius: 6px; padding: 12px; margin-bottom: 12px;
  font-size: 0.9rem; display: none;
}

/* ── Keyboard ── */
.keyboard { display: flex; flex-direction: column; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
.key-row { display: flex; gap: 3px; }
.key {
  height: 38px; min-width: 38px; padding: 0 4px;
  border: 1px solid #aaa; border-radius: 4px;
  background: linear-gradient(to bottom, #f0f0f0, #d8d8d8);
  cursor: pointer; font-size: 0.72rem; text-align: center;
  display: flex; align-items: center; justify-content: center;
  user-select: none; white-space: nowrap; flex-shrink: 0;
  transition: background 0.05s, transform 0.05s;
}
.key.pressed {
  background: #aaa;
  transform: translateY(1px);
}
.key.shift-active { background: linear-gradient(to bottom, #ffe082, #ffca28); }
/* Width variants */
.key-bs     { min-width: 68px; }
.key-tab    { min-width: 58px; }
.key-caps   { min-width: 68px; }
.key-enter  { min-width: 84px; }
.key-shiftl { min-width: 84px; }
.key-shiftr { min-width: 112px; }
.key-space  { min-width: 220px; }
.key-ctrl   { min-width: 58px; }
.key-alt    { min-width: 58px; }

.release-all-btn {
  margin-top: 10px; padding: 6px 16px;
  border: 1px solid #f44336; border-radius: 6px;
  background: #fff; color: #f44336;
  cursor: pointer; font-size: 0.85rem;
}

/* ── Mouse ── */
.touchpad {
  width: 100%; height: 240px;
  background: #e8e8e8; border-radius: 12px;
  border: 2px solid #bbb; margin-bottom: 14px;
  touch-action: none; cursor: crosshair;
  display: flex; align-items: center; justify-content: center;
  color: #aaa; font-size: 0.85rem; user-select: none;
}
.click-row { display: flex; gap: 12px; }
.btn-click {
  flex: 1; padding: 18px 0; border: 1px solid #999;
  border-radius: 8px; background: #e8e8e8;
  cursor: pointer; font-size: 1rem; user-select: none;
  text-align: center; touch-action: manipulation;
}
.btn-click.pressed { background: #bbb; }
</style>
</head>
<body>
<div class="container">
  <h1>M3Cube BLE Controller</h1>

  <div id="compat-warning" class="compat-warning">
    ⚠️ このブラウザは Web Bluetooth API に対応していません。Chrome または Edge をお使いください。
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('keyboard', this)">キーボード</button>
    <button class="tab-btn"        onclick="switchTab('mouse', this)">マウス</button>
  </div>

  <!-- Keyboard Tab -->
  <div id="tab-keyboard" class="tab-content active">
    <div class="conn-row">
      <button id="key-connect-btn" class="btn-connect" onclick="toggleKeyConnect()">接続</button>
      <span id="key-conn-status" class="conn-status">● 未接続</span>
    </div>
    <div class="keyboard" id="keyboard"></div>
    <button class="release-all-btn" onclick="releaseAll()">Release All</button>
    <div class="log-section">
      <div class="log-label">コマンドログ（直近5件）</div>
      <ul id="key-log" class="log-list"></ul>
    </div>
  </div>

  <!-- Mouse Tab -->
  <div id="tab-mouse" class="tab-content">
    <div class="conn-row">
      <button id="mouse-connect-btn" class="btn-connect" onclick="toggleMouseConnect()">接続</button>
      <span id="mouse-conn-status" class="conn-status">● 未接続</span>
    </div>
    <div id="touchpad" class="touchpad">ドラッグしてカーソルを移動</div>
    <div class="click-row">
      <button id="btn-left-click"  class="btn-click">左クリック</button>
      <button id="btn-right-click" class="btn-click">右クリック</button>
    </div>
    <div class="log-section">
      <div class="log-label">コマンドログ（直近5件）</div>
      <ul id="mouse-log" class="log-list"></ul>
    </div>
  </div>
</div>

<script>
// ── Compat check ──
if (!navigator.bluetooth) {
  document.getElementById('compat-warning').style.display = 'block';
}

// ── Tab switching ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── BLE constants ──
const KEY_SVC = 'a6b00020-4d33-4b52-8e2d-9b1c3d4e5f60';
const KEY_CHR = 'a6b00021-4d33-4b52-8e2d-9b1c3d4e5f60';
const MSE_SVC = 'a6b00022-4d33-4b52-8e2d-9b1c3d4e5f60';
const MSE_CHR = 'a6b00023-4d33-4b52-8e2d-9b1c3d4e5f60';

let keyChar   = null;
let mouseChar = null;
let keyConnecting   = false;
let mouseConnecting = false;
const enc = new TextEncoder();

// ── Command send ──
function sendKeyCmd(cmd) {
  addLog('key-log', cmd);
  if (keyChar) keyChar.writeValue(enc.encode(cmd)).catch(console.error);
}

function sendMouseCmd(cmd) {
  addLog('mouse-log', cmd);
  if (mouseChar) mouseChar.writeValue(enc.encode(cmd)).catch(console.error);
}

// ── Command log (last 5 entries) ──
function addLog(logId, cmd) {
  const ul = document.getElementById(logId);
  const li = document.createElement('li');
  li.textContent = '→ ' + cmd;
  ul.insertBefore(li, ul.firstChild);
  while (ul.children.length > 5) ul.removeChild(ul.lastChild);
}

// ── Keyboard BLE connect/disconnect ──
async function toggleKeyConnect() {
  if (keyChar) {
    keyChar.service.device.gatt.disconnect();
    return;
  }
  if (keyConnecting) return;
  keyConnecting = true;
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [KEY_SVC] }]
    });
    const server = await device.gatt.connect();
    const svc    = await server.getPrimaryService(KEY_SVC);
    keyChar      = await svc.getCharacteristic(KEY_CHR);
    device.addEventListener('gattserverdisconnected', onKeyDisconnect);
    document.getElementById('key-connect-btn').textContent = '切断';
    document.getElementById('key-connect-btn').classList.add('connected');
    document.getElementById('key-conn-status').textContent = '● ' + device.name;
    document.getElementById('key-conn-status').classList.add('connected');
  } catch (e) {
    if (e.name !== 'NotFoundError') console.error(e);
  } finally {
    keyConnecting = false;
  }
}

function onKeyDisconnect() {
  keyChar = null;
  releaseAll();
  document.getElementById('key-connect-btn').textContent = '接続';
  document.getElementById('key-connect-btn').classList.remove('connected');
  document.getElementById('key-conn-status').textContent = '● 未接続';
  document.getElementById('key-conn-status').classList.remove('connected');
}

// ── Mouse BLE connect/disconnect ──
async function toggleMouseConnect() {
  if (mouseChar) {
    mouseChar.service.device.gatt.disconnect();
    return;
  }
  if (mouseConnecting) return;
  mouseConnecting = true;
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [MSE_SVC] }]
    });
    const server = await device.gatt.connect();
    const svc    = await server.getPrimaryService(MSE_SVC);
    mouseChar    = await svc.getCharacteristic(MSE_CHR);
    device.addEventListener('gattserverdisconnected', onMouseDisconnect);
    document.getElementById('mouse-connect-btn').textContent = '切断';
    document.getElementById('mouse-connect-btn').classList.add('connected');
    document.getElementById('mouse-conn-status').textContent = '● ' + device.name;
    document.getElementById('mouse-conn-status').classList.add('connected');
  } catch (e) {
    if (e.name !== 'NotFoundError') console.error(e);
  } finally {
    mouseConnecting = false;
  }
}

function onMouseDisconnect() {
  endDrag();
  mouseChar = null;
  document.getElementById('mouse-connect-btn').textContent = '接続';
  document.getElementById('mouse-connect-btn').classList.remove('connected');
  document.getElementById('mouse-conn-status').textContent = '● 未接続';
  document.getElementById('mouse-conn-status').classList.remove('connected');
}

// ── Keyboard layout definition ──
// Each entry: [label, code, shiftLabel, shiftCode, cssClass]
// code=0 → key is non-functional (Caps Lock)
// shiftLabel/shiftCode=null → key has no shift variant
const KEY_ROWS = [
  // Function row
  [
    ['Esc', 27, null, null, ''],
    ['F1', 194, null, null, ''], ['F2', 195, null, null, ''],
    ['F3', 196, null, null, ''], ['F4', 197, null, null, ''],
    ['F5', 198, null, null, ''], ['F6', 199, null, null, ''],
    ['F7', 200, null, null, ''], ['F8', 201, null, null, ''],
    ['F9', 202, null, null, ''], ['F10', 203, null, null, ''],
    ['F11', 204, null, null, ''], ['F12', 205, null, null, ''],
  ],
  // Number row
  [
    ['`', 96, '~', 126, ''],
    ['1', 49, '!', 33, ''], ['2', 50, '@', 64, ''], ['3', 51, '#', 35, ''],
    ['4', 52, '$', 36, ''], ['5', 53, '%', 37, ''], ['6', 54, '^', 94, ''],
    ['7', 55, '&', 38, ''], ['8', 56, '*', 42, ''], ['9', 57, '(', 40, ''],
    ['0', 48, ')', 41, ''], ['-', 45, '_', 95, ''], ['=', 61, '+', 43, ''],
    ['BS', 8, null, null, 'key-bs'],
  ],
  // QWERTY row
  [
    ['Tab', 9, null, null, 'key-tab'],
    ['q', 113, 'Q', 81, ''], ['w', 119, 'W', 87, ''], ['e', 101, 'E', 69, ''],
    ['r', 114, 'R', 82, ''], ['t', 116, 'T', 84, ''], ['y', 121, 'Y', 89, ''],
    ['u', 117, 'U', 85, ''], ['i', 105, 'I', 73, ''], ['o', 111, 'O', 79, ''],
    ['p', 112, 'P', 80, ''], ['[', 91, '{', 123, ''],
    [']', 93, '}', 125, ''], ['\\', 92, '|', 124, ''],
  ],
  // Home row
  [
    ['Caps', 0, null, null, 'key-caps'],
    ['a', 97, 'A', 65, ''], ['s', 115, 'S', 83, ''], ['d', 100, 'D', 68, ''],
    ['f', 102, 'F', 70, ''], ['g', 103, 'G', 71, ''], ['h', 104, 'H', 72, ''],
    ['j', 106, 'J', 74, ''], ['k', 107, 'K', 75, ''], ['l', 108, 'L', 76, ''],
    [';', 59, ':', 58, ''], ["'", 39, '"', 34, ''],
    ['Enter', 13, null, null, 'key-enter'],
  ],
  // Shift row
  [
    ['Shift', 129, null, null, 'key-shiftl key-shift'],
    ['z', 122, 'Z', 90, ''], ['x', 120, 'X', 88, ''], ['c', 99, 'C', 67, ''],
    ['v', 118, 'V', 86, ''], ['b', 98, 'B', 66, ''], ['n', 110, 'N', 78, ''],
    ['m', 109, 'M', 77, ''], [',', 44, '<', 60, ''], ['.', 46, '>', 62, ''],
    ['/', 47, '?', 63, ''],
    ['Shift', 129, null, null, 'key-shiftr key-shift'],
  ],
  // Bottom row
  [
    ['Ctrl', 128, null, null, 'key-ctrl'],
    ['Alt', 130, null, null, 'key-alt'],
    ['Space', 32, null, null, 'key-space'],
    ['Alt', 130, null, null, 'key-alt'],
    ['Ctrl', 128, null, null, 'key-ctrl'],
  ],
];

// Arrow keys rendered as two extra rows below the main keyboard
const ARROW_ROWS = [
  [['↑', 218, null, null, '']],
  [['←', 216, null, null, ''], ['↓', 217, null, null, ''], ['→', 215, null, null, '']],
];

let shiftActive = false;
// Stores the keycode that was sent on press so release always matches press
const pressedCodes = new Map();

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  const allRows = [...KEY_ROWS, ...ARROW_ROWS];
  allRows.forEach((row, ri) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    // Indent the ↑ row so it sits centered above ↓
    if (ri === KEY_ROWS.length) rowEl.style.paddingLeft = '41px';

    row.forEach(([lbl, code, sLbl, sCode, cls]) => {
      const btn = document.createElement('div');
      btn.className = cls ? 'key ' + cls : 'key';
      btn.dataset.code       = code;
      btn.dataset.shiftCode  = sCode != null ? sCode : '';
      btn.dataset.label      = lbl;
      btn.dataset.shiftLabel = sLbl != null ? sLbl : '';
      btn.textContent = lbl;

      if (cls.includes('key-shift')) {
        btn.addEventListener('mousedown',  e => { e.preventDefault(); activateShift(); });
        btn.addEventListener('touchstart', e => { e.preventDefault(); activateShift(); }, { passive: false });
        btn.addEventListener('mouseup',    () => deactivateShift());
        btn.addEventListener('touchend',   () => deactivateShift());
        btn.addEventListener('touchcancel',() => deactivateShift());
        btn.addEventListener('mouseleave', () => deactivateShift());
      } else {
        btn.addEventListener('mousedown',  e => { e.preventDefault(); onKeyDown(btn); });
        btn.addEventListener('touchstart', e => { e.preventDefault(); onKeyDown(btn); }, { passive: false });
        btn.addEventListener('mouseup',    () => onKeyUp(btn));
        btn.addEventListener('touchend',   () => onKeyUp(btn));
        btn.addEventListener('touchcancel',() => onKeyUp(btn));
        btn.addEventListener('mouseleave', () => onKeyUp(btn));
      }
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}

function activateShift() {
  if (shiftActive) return;
  shiftActive = true;
  document.querySelectorAll('.key-shift').forEach(k => k.classList.add('shift-active'));
  document.querySelectorAll('#keyboard .key').forEach(k => {
    if (k.dataset.shiftLabel) k.textContent = k.dataset.shiftLabel;
  });
  sendKeyCmd('#M3CKP129');
}

function deactivateShift() {
  if (!shiftActive) return;
  shiftActive = false;
  document.querySelectorAll('.key-shift').forEach(k => k.classList.remove('shift-active'));
  document.querySelectorAll('#keyboard .key').forEach(k => {
    if (k.dataset.label) k.textContent = k.dataset.label;
  });
  sendKeyCmd('#M3CKR129');
}

function onKeyDown(btn) {
  // Use shift variant if shift is active and this key has one
  const code = shiftActive && btn.dataset.shiftCode
    ? parseInt(btn.dataset.shiftCode)
    : parseInt(btn.dataset.code);
  if (!code) return; // code=0 means non-functional key (Caps Lock)
  btn.classList.add('pressed');
  pressedCodes.set(btn, code); // remember what was pressed for matching release
  sendKeyCmd('#M3CKP' + code);
}

function onKeyUp(btn) {
  const code = pressedCodes.get(btn);
  if (code == null) return;
  btn.classList.remove('pressed');
  pressedCodes.delete(btn);
  sendKeyCmd('#M3CKR' + code);
}

function releaseAll() {
  pressedCodes.forEach((code, btn) => btn.classList.remove('pressed'));
  pressedCodes.clear();
  if (shiftActive) deactivateShift();
  sendKeyCmd('#M3CKRALL');
}

buildKeyboard();

// ── Mouse touchpad ──
const touchpadEl = document.getElementById('touchpad');
let isDragging = false;
let lastX = 0, lastY = 0;
let pendingX = 0, pendingY = 0;
let moveTimer = null;

function startDrag(cx, cy) {
  clearInterval(moveTimer);
  isDragging = true;
  lastX = cx; lastY = cy;
  pendingX = 0; pendingY = 0;
  moveTimer = setInterval(flushMove, 100);
}

function updateDrag(cx, cy) {
  if (!isDragging) return;
  pendingX += cx - lastX;
  pendingY += cy - lastY;
  lastX = cx; lastY = cy;
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  clearInterval(moveTimer);
  moveTimer = null;
  flushMove(); // send any remaining movement
}

function flushMove() {
  const ax = Math.max(-127, Math.min(127, Math.round(pendingX)));
  const ay = Math.max(-127, Math.min(127, Math.round(pendingY)));
  pendingX = 0;
  pendingY = 0;
  if (ax === 0 && ay === 0) return;
  sendMouseCmd('#M3CNMX' + ax + 'Y' + ay);
}

// Mouse events (desktop)
touchpadEl.addEventListener('mousedown',  e => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
touchpadEl.addEventListener('mousemove',  e => { updateDrag(e.clientX, e.clientY); });
touchpadEl.addEventListener('mouseup',    () => endDrag());
touchpadEl.addEventListener('mouseleave', () => endDrag());

// Touch events (mobile/tablet)
touchpadEl.addEventListener('touchstart', e => {
  e.preventDefault();
  startDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
touchpadEl.addEventListener('touchmove', e => {
  e.preventDefault();
  updateDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
touchpadEl.addEventListener('touchend',    () => endDrag());
touchpadEl.addEventListener('touchcancel', () => endDrag());

document.addEventListener('mouseup', () => endDrag());

// ── Click buttons ──
// JS listeners with preventDefault on touchstart prevent browsers from
// synthesizing duplicate mouse events on mobile.
function setupClickButton(id, pressCmd, releaseCmd) {
  const btn = document.getElementById(id);
  let isPressed = false;

  function release() {
    if (!isPressed) return;
    isPressed = false;
    btn.classList.remove('pressed');
    sendMouseCmd(releaseCmd);
  }

  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    isPressed = true;
    btn.classList.add('pressed');
    sendMouseCmd(pressCmd);
  });
  btn.addEventListener('mouseup', release);
  document.addEventListener('mouseup', release);

  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    isPressed = true;
    btn.classList.add('pressed');
    sendMouseCmd(pressCmd);
  }, { passive: false });
  btn.addEventListener('touchend',    release);
  btn.addEventListener('touchcancel', release);
}

setupClickButton('btn-left-click',  '#M3CNMLP', '#M3CNMLR');
setupClickButton('btn-right-click', '#M3CNMRP', '#M3CNMRR');
</script>
</body>
</html>
